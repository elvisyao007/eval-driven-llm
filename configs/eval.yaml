# Eval configuration. Everything that affects a score lives here so a run is
# reproducible from config alone (DECISIONS.md ADR-0001).

golden_set:
  name: jqara          # Track A: recognized benchmark (ADR-0004)
  version: "v0"        # frozen; never edit a cut version
  path: data/golden/jqara/v0

retrieval:
  ks: [5, 10]          # deterministic metrics computed at these cutoffs

judge:                 # pinned — see metrics_generation.JudgeConfig
  model: "local-judge@vllm"   # served locally; NOT a cloud API
  temperature: 0.0
  seed: 0
  runs_per_item: 3     # repeat to measure variance, not hide it

gates:                 # regression gate thresholds (agreed before the run)
  "recall@5": null     # set after baseline; null = informational only for now
  "p@1": null

generation:            # end-to-end RAG eval (rag_eval.py)
  k: 5                 # contexts passed to the generator
  gen_model: gemma4-27b-q
  # judge is a SEPARATE local model so it does not grade its own homework
  judge_model: elyza-jp-8b
  base_url: "http://localhost:8000/v1"   # local vLLM/LiteLLM; never a cloud API
  runs_per_item: 3     # repeat judging to measure variance, not hide it
  grounded_but_wrong:  # flag thresholds (read faithfulness vs context recall)
    faithfulness_high: 0.8
    context_recall_low: 0.5
