# Model registry. Payload models are swappable (ADR-0003). Deployment path is
# on-prem / clean-license only; Chinese models are content-layer only.

generation:
  default: gemma4:31b        # Apache-2.0, multilingual; on-prem via Ollama
  dev: qwen3:32b             # Qwen3 32B; strong multilingual alternative
  comparison:                # measure, don't assume: actual JQaRA scores decide
    - gemma4:31b
    - qwen3:32b
  serve: ollama              # OpenAI-compatible at http://localhost:11434/v1

# ── Phase 4 pinned judge ────────────────────────────────────────────────────
# judge MUST differ from the generator (no self-grading).
# Current pairing:  gen=qwen3:32b  judge=gemma4:31b  (different families ✓)
judge:
  default: gemma4:31b        # Gemma family judges Qwen output
  temperature: 0.0
  seed: 0
  runs_per_item: 3           # repeat to measure spread, not hide it

embedding:
  # in-sandbox / baseline: lexical, no downloads, deterministic
  baseline:
    name: hashing
    dim: 1024
  # production semantic embedder (needs weights on the target machine)
  default:
    name: ruri
    model: cl-nagoya/ruri-v3-310m
    # Ruri expects instruction prefixes — VERIFY against the model card,
    # a wrong prefix silently degrades retrieval.
    query_prefix: "検索クエリ: "
    doc_prefix: "検索文書: "
  hybrid: bge-m3             # dense+sparse+multivector in one model

reranker:
  default: bge-reranker-v2-m3
  widen: 50                  # first-pass candidates before rerank
