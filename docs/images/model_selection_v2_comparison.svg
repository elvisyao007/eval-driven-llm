<text x="340" y="262" font-family="system-ui,sans-serif" font-size="11" fill="#888780" text-anchor="middle">★ 45-question sample — treat nemotron tie as a lead, not a verdict · judge: qwen3:32b (not a contestant) · RTX 5090 32 GB</text>
