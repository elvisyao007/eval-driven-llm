<svg viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" role="img">
<title>2x2 retrieval comparison: DeepDoc advantage doubles under dense retrieval</title>
<desc>Grouped bar chart of hit@5. Plain text: 56.2% BM25, 40.6% dense. DeepDoc: 68.8% BM25, 65.6% dense. DeepDoc advantage is +12.5% on BM25 but +25.0% on dense. Plain text plus dense is the worst cell.</desc>

<rect width="680" height="380" fill="white"/>

<text x="24" y="32" font-family="system-ui,sans-serif" font-size="15" font-weight="500" fill="#2C2C2A">hit@5 — DeepDoc's edge doubles when you switch to dense retrieval</text>
<text x="24" y="50" font-family="system-ui,sans-serif" font-size="12" fill="#888780">harder golden set (oracle 87.5%) · Japanese embedder (ruri-v3) · 3 docs / 32 questions</text>

<!-- legend -->
<rect x="430" y="66" width="12" height="12" rx="2" fill="#8B7BD8"/>
<text x="448" y="77" font-family="system-ui,sans-serif" font-size="11" fill="#5F5E5A">plain text</text>
<rect x="530" y="66" width="12" height="12" rx="2" fill="#1D9E75"/>
<text x="548" y="77" font-family="system-ui,sans-serif" font-size="11" fill="#5F5E5A">DeepDoc</text>

<!-- y axis -->
<text x="56" y="104" font-family="system-ui,sans-serif" font-size="11" fill="#888780" text-anchor="end">80%</text>
<text x="56" y="160" font-family="system-ui,sans-serif" font-size="11" fill="#888780" text-anchor="end">60%</text>
<text x="56" y="216" font-family="system-ui,sans-serif" font-size="11" fill="#888780" text-anchor="end">40%</text>
<text x="56" y="272" font-family="system-ui,sans-serif" font-size="11" fill="#888780" text-anchor="end">20%</text>
<text x="56" y="300" font-family="system-ui,sans-serif" font-size="11" fill="#888780" text-anchor="end">0%</text>

<!-- gridlines: y=300 is 0%, 2.8px per 1% → 80%=224px above → y=76 -->
<line x1="64" y1="100" x2="620" y2="100" stroke="#E8E7E0" stroke-width="0.5"/>
<line x1="64" y1="156" x2="620" y2="156" stroke="#E8E7E0" stroke-width="0.5"/>
<line x1="64" y1="212" x2="620" y2="212" stroke="#E8E7E0" stroke-width="0.5"/>
<line x1="64" y1="268" x2="620" y2="268" stroke="#E8E7E0" stroke-width="0.5"/>
<line x1="64" y1="296" x2="620" y2="296" stroke="#D3D1C7" stroke-width="0.5"/>

<!-- BM25 group (center ~210) -->
<!-- plain 56.2% → 157px tall → y=139 -->
<rect x="150" y="139" width="56" height="157" rx="4" fill="#8B7BD8"/>
<text x="178" y="132" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#5B4CB0" text-anchor="middle">56.2%</text>
<!-- deepdoc 68.8% → 193px → y=103 -->
<rect x="212" y="103" width="56" height="193" rx="4" fill="#1D9E75"/>
<text x="240" y="96" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#157355" text-anchor="middle">68.8%</text>
<text x="209" y="318" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#2C2C2A" text-anchor="middle">BM25 (lexical)</text>
<text x="209" y="336" font-family="system-ui,sans-serif" font-size="12" fill="#1D9E75" text-anchor="middle">delta +12.5%</text>

<!-- Dense group (center ~440) -->
<!-- plain 40.6% → 114px → y=182 -->
<rect x="380" y="182" width="56" height="114" rx="4" fill="#8B7BD8"/>
<text x="408" y="175" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#5B4CB0" text-anchor="middle">40.6%</text>
<!-- deepdoc 65.6% → 184px → y=112 -->
<rect x="442" y="112" width="56" height="184" rx="4" fill="#1D9E75"/>
<text x="470" y="105" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#157355" text-anchor="middle">65.6%</text>
<text x="439" y="318" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#2C2C2A" text-anchor="middle">Dense (embedding)</text>
<text x="439" y="336" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#157355" text-anchor="middle">delta +25.0%</text>

<!-- callout on worst cell -->
<text x="408" y="360" font-family="system-ui,sans-serif" font-size="10" fill="#D85A30" text-anchor="middle">plain+dense is the worst cell — fragmentation hurts dense most</text>

<!-- divider between groups -->
<line x1="324" y1="100" x2="324" y2="296" stroke="#E8E7E0" stroke-width="0.5" stroke-dasharray="3 3"/>
</svg>
