<svg viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" role="img">
<title>DeepDoc font-path routing: why the same parser behaves differently</title>
<desc>Flow diagram showing how DeepDoc routes a PDF. If it has an extractable text layer, it goes to native text extraction with 0% era-name error. If not, it falls back to OCR where era-name corruption reaches ~100%.</desc>

<rect width="680" height="320" fill="white"/>

<defs>
<marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 2L8 5L2 8" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<text x="24" y="32" font-family="system-ui,sans-serif" font-size="15" font-weight="500" fill="#2C2C2A">Why the same parser breaks era names on some PDFs but not others</text>

<!-- input -->
<rect x="40" y="60" width="150" height="56" rx="8" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
<text x="115" y="84" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#2C2C2A" text-anchor="middle">Japanese PDF</text>
<text x="115" y="102" font-family="system-ui,sans-serif" font-size="11" fill="#888780" text-anchor="middle">enters DeepDoc</text>

<line x1="190" y1="88" x2="238" y2="88" stroke="#888780" stroke-width="1" marker-end="url(#ar)"/>

<!-- decision -->
<rect x="240" y="58" width="180" height="60" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="330" y="82" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#3C3489" text-anchor="middle">extractable text layer?</text>
<text x="330" y="100" font-family="system-ui,sans-serif" font-size="11" fill="#534AB7" text-anchor="middle">does the PDF embed real text</text>

<!-- branch yes -->
<path d="M420 76 L470 76 L470 150 L498 150" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#ar)"/>
<text x="455" y="70" font-family="system-ui,sans-serif" font-size="11" fill="#1D9E75" text-anchor="middle" font-weight="500">yes</text>

<!-- branch no -->
<path d="M420 100 L470 100 L470 232 L498 232" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#ar)"/>
<text x="455" y="124" font-family="system-ui,sans-serif" font-size="11" fill="#D85A30" text-anchor="middle" font-weight="500">no</text>

<!-- native text path (good) -->
<rect x="500" y="124" width="156" height="56" rx="8" fill="#EAF3DE" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="578" y="146" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#085041" text-anchor="middle">native text (pdfplumber)</text>
<text x="578" y="164" font-family="system-ui,sans-serif" font-size="11" fill="#1D9E75" text-anchor="middle" font-weight="500">令→今 error: 0%</text>

<!-- OCR path (bad) -->
<rect x="500" y="206" width="156" height="56" rx="8" fill="#FAE9E2" stroke="#F0997B" stroke-width="0.5"/>
<text x="578" y="228" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#4A1B0C" text-anchor="middle">OCR fallback</text>
<text x="578" y="246" font-family="system-ui,sans-serif" font-size="11" fill="#A8401E" text-anchor="middle" font-weight="500">令→今 error: ~100%</text>

<!-- doc type labels under each path -->
<text x="578" y="190" font-family="system-ui,sans-serif" font-size="10" fill="#888780" text-anchor="middle">gov reports · Word exports</text>
<text x="578" y="277" font-family="system-ui,sans-serif" font-size="10" fill="#888780" text-anchor="middle">scans · 請求書 · e-Tax forms</text>

<!-- key insight box -->
<rect x="40" y="282" width="616" height="26" rx="6" fill="#F1EFE8"/>
<text x="348" y="299" font-family="system-ui,sans-serif" font-size="11" fill="#5F5E5A" text-anchor="middle">the Japanese-specific failure isn't in the parser — it's concentrated in the OCR fallback, which a lot of enterprise documents unavoidably hit</text>
</svg>
